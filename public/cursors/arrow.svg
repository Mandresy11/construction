<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28">
  <!-- Le pointeur "chaud" (point de clic réel) est le coin (0,0) du canevas :
       le navigateur ne peut pas décaler le point d'ancrage ici (syntaxe
       cursor: url() x y non supportée par le pipeline CSS du projet), donc
       la pointe de la flèche est dessinée au plus près de l'origine. -->
  <path
    d="M1 1 L1 21.5 L6.2 16.6 L10 24.5 L14.2 22.5 L10.3 14.6 L17.5 14.6 Z"
    fill="#f1efe6"
    stroke="#14140f"
    stroke-width="1.8"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <circle cx="2.5" cy="3" r="2.4" fill="#e2372a" stroke="#14140f" stroke-width="1" />
</svg>
